<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette - Epic Name Picker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }
        canvas {
            filter: drop-shadow(0 0 25px rgba(56, 189, 248, 0.2));
            transition: filter 0.3s ease;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #0284c7; }
        
        #winnerModal {
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">

    <div class="flex-1 flex flex-col items-center justify-center p-8 relative">
        <h1 class="text-4xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 mb-8 drop-shadow-lg">
            ROULETTE
        </h1>
        
        <div class="relative">
            <div class="absolute top-0 left-1/2 transform -translate-x-1/2 -translate-y-4 z-10">
                <div class="w-0 h-0 border-l-[15px] border-l-transparent border-r-[15px] border-r-transparent border-t-[30px] border-t-rose-500 drop-shadow-[0_0_10px_rgba(244,63,94,0.8)]"></div>
            </div>
            
            <canvas id="rouletteWheel" width="500" height="500" class="max-w-full h-auto"></canvas>
            
            <button id="spinBtnCenter" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-slate-800 border-4 border-cyan-400 text-cyan-400 rounded-full w-24 h-24 font-bold text-xl hover:bg-cyan-400 hover:text-slate-900 transition-all duration-300 shadow-[0_0_20px_rgba(34,211,238,0.5)]">
                SPIN
            </button>
        </div>
    </div>

    <div class="w-full md:w-[400px] bg-slate-800 border-l border-slate-700 p-6 flex flex-col shadow-2xl z-20">
        <div class="mb-4 flex justify-between items-center">
            <h2 class="text-xl font-semibold">Daftar Entri</h2>
            <span id="entryCount" class="bg-cyan-900 text-cyan-300 text-xs px-2 py-1 rounded-full font-bold">0 Entri</span>
        </div>
        
        <p class="text-xs text-slate-400 mb-3">Masukkan nama (pisahkan dengan baris baru). Mendukung hingga ribuan nama.</p>
        
        <textarea id="nameInput" class="flex-1 bg-slate-900 border border-slate-600 rounded-lg p-4 text-sm focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 resize-none mb-6" placeholder="Budi&#10;Siti&#10;Andi&#10;..."></textarea>
        
        <div class="flex gap-3">
            <button id="shuffleBtn" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-lg font-semibold transition-colors">
                Acak Urutan
            </button>
            <button id="spinBtnSide" class="flex-1 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white py-3 rounded-lg font-bold text-lg shadow-[0_0_15px_rgba(34,211,238,0.4)] transition-all transform hover:scale-105">
                SPIN!
            </button>
        </div>
    </div>

    <div id="winnerModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 opacity-0 pointer-events-none scale-95">
        <div class="bg-slate-800 p-10 rounded-2xl border-2 border-cyan-400 text-center shadow-[0_0_50px_rgba(34,211,238,0.3)] max-w-lg w-full mx-4">
            <h3 class="text-2xl text-cyan-400 font-semibold mb-2">Pemenangnya adalah...</h3>
            <div id="winnerText" class="text-5xl font-extrabold text-white mb-8 break-words"></div>
            <button id="closeModalBtn" class="bg-rose-500 hover:bg-rose-600 text-white px-8 py-3 rounded-full font-bold transition-colors">
                Tutup
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('rouletteWheel');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('nameInput');
        const entryCount = document.getElementById('entryCount');
        const spinBtnCenter = document.getElementById('spinBtnCenter');
        const spinBtnSide = document.getElementById('spinBtnSide');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const winnerModal = document.getElementById('winnerModal');
        const winnerText = document.getElementById('winnerText');
        const closeModalBtn = document.getElementById('closeModalBtn');

        let names = ["Ali", "Beatriz", "Charles", "Diya", "Eric", "Fatima", "Gabriel", "Hanna"];
        let colors = ['#f43f5e', '#ec4899', '#d946ef', '#a855f7', '#8b5cf6', '#6366f1', '#3b82f6', '#0ea5e9', '#06b6d4', '#14b8a6', '#10b981', '#22c55e', '#eab308', '#f59e0b', '#f97316'];
        
        let currentAngle = 0;
        let isSpinning = false;
        let spinVelocity = 0;
        let animationId;

        // Inisialisasi Textarea
        nameInput.value = names.join('\n');
        updateEntryCount();

        function getColorsForEntries(count) {
            let res = [];
            for(let i=0; i<count; i++) {
                res.push(colors[i % colors.length]);
            }
            return res;
        }

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2 - 10;
            
            if (names.length === 0) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fillStyle = '#1e293b';
                ctx.fill();
                return;
            }

            const sliceAngle = (2 * Math.PI) / names.length;
            const currentColors = getColorsForEntries(names.length);

            for (let i = 0; i < names.length; i++) {
                const startAngle = currentAngle + i * sliceAngle;
                const endAngle = startAngle + sliceAngle;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fillStyle = currentColors[i];
                ctx.fill();
                ctx.lineWidth = 1;
                ctx.strokeStyle = '#0f172a';
                ctx.stroke();

                // Optimasi visual: Hanya gambar teks jika entri < 100 agar tidak lag dan bertumpuk
                if (names.length <= 100) {
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(startAngle + sliceAngle / 2);
                    ctx.textAlign = "right";
                    ctx.fillStyle = "#ffffff";
                    
                    // Sesuaikan ukuran font dengan jumlah entri
                    let fontSize = names.length > 50 ? 10 : (names.length > 20 ? 14 : 20);
                    ctx.font = `bold ${fontSize}px Poppins`;
                    
                    ctx.fillText(names[i].length > 15 ? names[i].substring(0, 15) + '...' : names[i], radius - 20, fontSize/3);
                    ctx.restore();
                }
            }
        }

        function updateNamesFromInput() {
            const rawText = nameInput.value;
            names = rawText.split('\n').map(n => n.trim()).filter(n => n !== '');
            updateEntryCount();
            if (!isSpinning) drawWheel();
        }

        function updateEntryCount() {
            entryCount.innerText = `${names.length} Entri`;
        }

        nameInput.addEventListener('input', updateNamesFromInput);

        shuffleBtn.addEventListener('click', () => {
            if (isSpinning) return;
            names.sort(() => Math.random() - 0.5);
            nameInput.value = names.join('\n');
            drawWheel();
        });

        function easeOutQuart(t) {
            return 1 - (--t) * t * t * t;
        }

        function spin() {
            if (isSpinning || names.length === 0) return;
            isSpinning = true;

            // Logika putaran: Kecepatan awal random, durasi 5-7 detik
            const spinDuration = 5000 + Math.random() * 2000; 
            const startAngle = currentAngle;
            // Berputar minimal 10 kali putaran penuh (Math.PI * 2 * 10) + acak
            const totalRotation = (Math.PI * 2 * 10) + (Math.random() * Math.PI * 2);
            const startTime = performance.now();

            function animate(currentTime) {
                const elapsedTime = currentTime - startTime;
                let progress = elapsedTime / spinDuration;

                if (progress >= 1) {
                    progress = 1;
                    isSpinning = false;
                }

                // Gunakan easing untuk efek melambat yang dramatis
                const easeProgress = easeOutQuart(progress);
                currentAngle = startAngle + (totalRotation * easeProgress);
                
                // Normalisasi angle
                currentAngle = currentAngle % (Math.PI * 2);

                drawWheel();

                if (progress < 1) {
                    animationId = requestAnimationFrame(animate);
                } else {
                    showWinner();
                }
            }

            requestAnimationFrame(animate);
        }

        function showWinner() {
            // Logika mencari pemenang berdasarkan posisi panah (di atas / -90 derajat / 270 derajat)
            // Karena panah di atas, angle penunjuk adalah 3 * Math.PI / 2
            const sliceAngle = (2 * Math.PI) / names.length;
            
            // Konversi posisi panah ke sistem koordinat roda yang berputar
            // Offset PI/2 karena panah ada di atas (12 o'clock)
            let normalizedAngle = (currentAngle + Math.PI / 2) % (Math.PI * 2);
            if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;

            // Hitung index yang ada di posisi 12 o'clock
            let winningIndex = Math.floor(((2 * Math.PI) - normalizedAngle) / sliceAngle) % names.length;
            
            winnerText.innerText = names[winningIndex];
            
            // Tampilkan Modal
            winnerModal.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
            winnerModal.classList.add('opacity-100', 'scale-100');
        }

        closeModalBtn.addEventListener('click', () => {
            winnerModal.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
            winnerModal.classList.remove('opacity-100', 'scale-100');
        });

        spinBtnCenter.addEventListener('click', spin);
        spinBtnSide.addEventListener('click', spin);

        // Gambar roda awal
        drawWheel();
    </script>
</body>
</html>
